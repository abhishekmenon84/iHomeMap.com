<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iHomeMap — 3D Walkthrough</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0e; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #app { position: fixed; inset: 0; }
    #status {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #cfd2dc; gap: 14px;
      pointer-events: none; text-align: center; padding: 24px;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.15);
      border-top-color: #6c8cff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status small { color: #80838f; font-size: 13px; max-width: 320px; }
    #err { color: #ff8a8a; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="status">
    <div class="spinner" id="spin"></div>
    <div id="msg">Loading 3D model…</div>
    <small id="hint"></small>
    <div id="err"></div>
  </div>

  <script type="module">
    import * as GS from "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js";

    // Backend gated endpoint — full vs blurred decided server-side.
    const API_BASE = "https://abhishekmenon84--ihomemap-v2-fastapi-app.modal.run";

    const params = new URLSearchParams(location.search);
    const ply = params.get("ply") || "";
    const statusEl = document.getElementById("status");
    const msgEl = document.getElementById("msg");
    const errEl = document.getElementById("err");
    const spinEl = document.getElementById("spin");

    function fail(text) {
      spinEl.style.display = "none";
      msgEl.style.display = "none";
      errEl.style.display = "block";
      errEl.textContent = text;
    }

    if (!ply) {
      fail("No model specified.");
    } else {
      // Accept either a bare scan-id (preferred) or a full URL (back-compat).
      const url = /^https?:\/\//.test(ply)
        ? ply
        : `${API_BASE}/v2/splat/${encodeURIComponent(ply)}.ply`;

      try {
        const viewer = new GS.Viewer({
          cameraUp: [0, -1, 0],          // ARKit/nerf Y-down
          initialCameraPosition: [0, 0, -3],
          initialCameraLookAt: [0, 0, 0],
          sphericalHarmonicsDegree: 0,
          sharedMemoryForWorkers: false,  // works without COOP/COEP headers on GH Pages
        });

        viewer.addSplatScene(url, { format: GS.SceneFormat.Ply, showLoadingUI: false })
          .then(() => {
            statusEl.style.display = "none";
            viewer.start();
          })
          .catch((e) => {
            console.error(e);
            fail("Could not load this 3D model.");
          });
      } catch (e) {
        console.error(e);
        fail("Viewer failed to start.");
      }
    }
  </script>
</body>
</html>
