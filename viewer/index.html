<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iHomeMap — 3D Walkthrough</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0e; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #status {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #cfd2dc; gap: 14px;
      pointer-events: none; text-align: center; padding: 24px; z-index: 10;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.15);
      border-top-color: #6c8cff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 15px; }
    #err { color: #ff9a9a; font-size: 13px; max-width: 340px; display: none; white-space: pre-wrap; }
  </style>

  <!-- three.js must be resolvable for @mkkellogg/gaussian-splats-3d -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="status">
    <div class="spinner" id="spin"></div>
    <div id="msg">Loading 3D model…</div>
    <div id="err"></div>
  </div>

  <script type="module">
    const API_BASE = "https://abhishekmenon84--ihomemap-v2-fastapi-app.modal.run";
    const spinEl = document.getElementById("spin");
    const msgEl  = document.getElementById("msg");
    const errEl  = document.getElementById("err");

    function fail(text) {
      if (spinEl) spinEl.style.display = "none";
      if (msgEl)  msgEl.style.display  = "none";
      errEl.style.display = "block";
      errEl.textContent = text;
      console.error("[viewer]", text);
    }

    async function main() {
      const ply = new URLSearchParams(location.search).get("ply") || "";
      if (!ply) return fail("No model specified.");

      const url = /^https?:\/\//.test(ply)
        ? ply
        : `${API_BASE}/v2/splat/${encodeURIComponent(ply)}.ply`;

      // Import the library only after the import map is in place.
      let GS;
      try {
        GS = await import("https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js");
      } catch (e) {
        return fail("Failed to load 3D engine.\n" + (e?.message || e));
      }

      try {
        const viewer = new GS.Viewer({
          cameraUp: [0, -1, 0],            // ARKit / nerf Y-down
          initialCameraPosition: [0, 0, -3],
          initialCameraLookAt: [0, 0, 0],
          sphericalHarmonicsDegree: 0,
          sharedMemoryForWorkers: false,    // no COOP/COEP needed (GitHub Pages)
          useBuiltInControls: true,
        });

        await viewer.addSplatScene(url, {
          format: GS.SceneFormat.Ply,
          showLoadingUI: false,
          progressiveLoad: false,
        });

        document.getElementById("status").style.display = "none";
        viewer.start();
      } catch (e) {
        fail("Could not render this model.\n" + (e?.message || e));
      }
    }

    window.addEventListener("error", (e) => fail("Error: " + e.message));
    window.addEventListener("unhandledrejection", (e) => fail("Error: " + (e.reason?.message || e.reason)));
    main();
  </script>
</body>
</html>
